{% extends "base.html" %}

{% block content %}

<div style="max-width: 900px; margin: auto; padding: 20px;">

    <h2>Coding Practice</h2>
    <p>Page {{ page }}</p>

    <hr>

    {% for question in questions %}

        <div style="margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
            
            <p style="white-space: pre-line;">
                {{ question.question_text }}
            </p>

            <a href="{{ question.leetcode_link }}" target="_blank">
                <button style="margin-top:10px;">Solve on LeetCode</button>
            </a>

        </div>

    {% empty %}
        <p>No coding questions available.</p>
    {% endfor %}

    <div style="display: flex; justify-content: space-between; margin-top: 20px;">

        {% if page > 1 %}
            <a href="?page={{ page|add:-1 }}">
                <button>Previous</button>
            </a>
        {% endif %}

        <a href="?page={{ page|add:1 }}">
            <button>Next</button>
        </a>

    </div>

</div>

{% endblock %}
