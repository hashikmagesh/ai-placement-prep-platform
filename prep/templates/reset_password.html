{% extends "base.html" %}

{% block content %}

<style>
    .auth-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background-color: #fff;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #2c3e50;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 5px;
        font-weight: 500;
        color: #333;
    }

    input[type="password"] {
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
    }

    button {
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background-color: #2d6cdf;
        color: white;
        transition: 0.3s;
    }

    button:hover {
        background-color: #1f57c3;
    }

    .back-link {
        text-align: center;
        margin-top: 10px;
    }

    .back-link a {
        color: #2d6cdf;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-container">

    <h2>Reset Password</h2>

    {% include 'includes/errors.html' %}

    <form method="post">
        {% csrf_token %}

        <label for="new_password">New Password</label>
        <input type="password" name="new_password" id="new_password" required>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required>

        <button type="submit">Change Password</button>
    </form>

    <div class="back-link">
        <a href="{% url 'prep:login' %}">Back to Login</a>
    </div>

</div>

{% endblock content %}
