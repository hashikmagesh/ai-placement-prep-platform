{% extends "base.html" %}
{% block content %}

<style>
.container {
    max-width: 1000px;
    margin: 60px auto;
}

.roadmap-box {
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.roadmap-meta {
    margin-bottom: 20px;
    color: gray;
}

.roadmap-content {
    white-space: pre-wrap;
    line-height: 1.7;
}
</style>

<div class="container">

    <h2>{{ roadmap.domain }} - {{ roadmap.company }}</h2>

    <div class="roadmap-meta">
        Created on {{ roadmap.created_at }}
    </div>

    <div class="roadmap-box">
        <div class="roadmap-content">
            {{ roadmap.content }}
        </div>
    </div>

</div>

{% endblock %}
