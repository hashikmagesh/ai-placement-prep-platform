<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Placement Prep Tracker{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'roadmap/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🎯 Placement Prep Tracker</h1>
            {% if request.path != '/' %}
            <a href="{% url 'reset' %}" class="reset-btn">← Back to Home</a>
            {% endif %}
        </div>
    </nav>
    
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
    
    <footer class="footer">
        <p>&copy; 2024 Placement Prep Tracker | Your journey to success</p>
    </footer>
    
    {% block scripts %}
    {% endblock %}
</body>
</html>
