{% extends 'roadmap/base.html' %}

{% block title %}Select Your Path{% endblock %}

{% block content %}
<div class="container">
    <div class="select-card">
        <h2 class="page-title">🚀 Start Your Preparation Journey</h2>
        <p class="subtitle">Choose your domain and target company to get a personalized roadmap</p>
        
        <form method="POST" class="select-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="domain">📚 Select Domain</label>
                <select name="domain" id="domain" required>
                    <option value="">-- Choose Domain --</option>
                    {% for domain in domains %}
                    <option value="{{ domain }}">{{ domain }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="company">🏢 Select Company</label>
                <select name="company" id="company" required>
                    <option value="">-- Choose Company --</option>
                    {% for company in companies %}
                    <option value="{{ company }}">{{ company }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="submit-btn">
                Generate My Roadmap →
            </button>
        </form>
    </div>
</div>
{% endblock %}
